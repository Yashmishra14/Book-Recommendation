<!-- Common Navbar Component -->
<nav class="unified-navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-container">
        <a href="/second" class="nav-logo" aria-label="BookWorld Home">
            <i class="fas fa-book-open" aria-hidden="true"></i>
            BookWorld
        </a>
        <ul class="nav-links" role="menubar">
            <li role="none"><a href="/second" role="menuitem" class="nav-link {% if request.endpoint == 'second' %}active{% endif %}">Home</a></li>
            <li role="none"><a href="/recommend" role="menuitem" class="nav-link {% if request.endpoint == 'recommend' %}active{% endif %}">Recommendations</a></li>
            <li role="none"><a href="/search" role="menuitem" class="nav-link {% if request.endpoint == 'search' %}active{% endif %}">A-Z Search</a></li>
            <li role="none"><a href="/about" role="menuitem" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About Us</a></li>
        </ul>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <i class="fas fa-moon" id="themeIcon"></i>
            <span id="themeText">Dark Mode</span>
        </button>
    </div>
</nav>

<style>
    .unified-navbar {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding: 1rem 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        transition: all 0.3s ease;
    }

    .unified-navbar.scrolled {
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .unified-navbar.scrolled .nav-links a {
        color: #333;
    }

    .unified-navbar.scrolled .nav-logo {
        color: #333;
    }

    .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2rem;
    }

    .nav-logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: white;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
    }

    .nav-logo:hover {
        color: #667eea;
        text-decoration: none;
        transform: translateY(-2px);
    }

    .nav-links {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 2rem;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 25px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .nav-links a::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s;
    }

    .nav-links a:hover::before {
        left: 100%;
    }

    .nav-links a:hover {
        color: #667eea;
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
    }

    .nav-links a.active {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .theme-toggle {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 25px;
        cursor: pointer;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .theme-toggle:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .theme-toggle:active {
        transform: translateY(0);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .nav-container {
            padding: 0 1rem;
        }

        .nav-links {
            gap: 1rem;
        }

        .nav-links a {
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
        }

        .theme-toggle {
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
        }
    }

    @media (max-width: 480px) {
        .nav-links {
            gap: 0.5rem;
        }

        .nav-links a {
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
        }

        .theme-toggle {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
    }
</style>

<script>
    // Unified navbar functionality
    document.addEventListener('DOMContentLoaded', function() {
        const navbar = document.querySelector('.unified-navbar');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        const body = document.body;

        // Navbar scroll effect
        window.addEventListener('scroll', function() {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Theme toggle functionality
        const currentTheme = localStorage.getItem('theme') || 'light';
        body.classList.toggle('dark', currentTheme === 'dark');
        updateThemeIcon();

        themeToggle.addEventListener('click', function() {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        });

        function updateThemeIcon() {
            const isDark = body.classList.contains('dark');
            themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            themeText.textContent = isDark ? 'Light Mode' : 'Dark Mode';
        }
    });
</script>
